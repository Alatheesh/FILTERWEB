<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --glass-bg: rgba(20, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent: #00d2ff;
            --btn-glow: rgba(0, 210, 255, 0.4);
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1.4rem;
            word-wrap: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }
        
        /* Video Download Button */
        .premium-dl-btn {
            background: rgba(0, 210, 255, 0.15);
            color: #fff;
            border: 1px solid var(--accent);
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--btn-glow);
            text-decoration: none;
            margin-bottom: 20px;
        }
        .premium-dl-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.03);
        }

        /* Image Card UI */
        .image-wrapper {
            background: #000;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .image-wrapper img, video {
            width: 100%;
            display: block;
            border-radius: 12px 12px 0 0;
        }
        video {
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }
        .img-dl-bar {
            background: rgba(20, 25, 30, 0.9);
            padding: 12px;
            display: flex;
            justify-content: center;
            border-top: 1px solid var(--glass-border);
        }
        .dl-sm-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .dl-sm-btn:hover {
            background: var(--accent);
            color: #000;
        }
        
        .footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
        .footer-brand {
            margin-bottom: 8px;
            font-size: 1em;
            letter-spacing: 1px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .footer a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--accent);
        }
        .credits-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2 id="mediaTitle">Loading Media...</h2>
        
        <!-- Video Action Bar (Hidden by default) -->
        <div id="videoActionContainer"></div>
        
        <div class="media-content" id="mediaContent">
        </div>

        <div class="footer">
            <div class="footer-brand">ミ💖 🇸 🇺 🇨 🇭 🇮 🇹 🇭 🇦 💖彡</div>
            <div class="credits-container">
                <span>Credits <a onclick="openTgLink('https://t.me/llathu63035')">NTM</a></span>
                <span>•</span>
                <span>Developer <a onclick="openTgLink('https://t.me/TG_LATHEESH')">LATHEESH</a></span>
            </div>
        </div>
    </div>

    <script>
        function openTgLink(url) {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                window.Telegram.WebApp.openTelegramLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function decodeUrls(str) {
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            return decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        const params = new URLSearchParams(window.location.search);
        const movieTitleClean = params.get('title') || 'Movie_Media';
        document.getElementById('mediaTitle').textContent = decodeURIComponent(movieTitleClean);

        const imgData = params.get('data');
        const videoUrl = params.get('video');
        const contentBox = document.getElementById('mediaContent');
        const videoActionContainer = document.getElementById('videoActionContainer');

        if (videoUrl) {
            // VIDEO MODE
            const activeRawVideoUrl = decodeURIComponent(videoUrl);
            
            // Provides a clean native anchor link for video downloading
            videoActionContainer.innerHTML = `
                <a href="${activeRawVideoUrl}" download class="premium-dl-btn" target="_top">
                    📥 Download Video Clip
                </a>
            `;
            
            contentBox.innerHTML = `
                <video controls autoplay playsinline preload="auto">
                    <source src="${activeRawVideoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
        } else if (imgData) {
            // IMAGE MODE
            try {
                const urls = decodeUrls(imgData).split(',');
                urls.forEach((url, index) => {
                    if(url.trim() !== '') {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'image-wrapper';
                        
                        wrapper.innerHTML = `
                            <img src="${url}" alt="Screenshot ${index + 1}" loading="lazy">
                            <div class="img-dl-bar">
                                <button class="dl-sm-btn" id="btn-${index}" onclick="downloadSingleImage('${url}', ${index})">⬇️ Save Image</button>
                            </div>
                        `;
                        contentBox.appendChild(wrapper);
                    }
                });
            } catch (e) {
                contentBox.innerHTML = "<p>Error rendering image cards.</p>";
            }
        } else {
            contentBox.innerHTML = "<p>No media data found.</p>";
        }

        // INDIVIDUAL IMAGE DOWNLOADER
        async function downloadSingleImage(url, index) {
            const btn = document.getElementById(`btn-${index}`);
            btn.innerHTML = "⏳ Saving...";
            
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const bUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = bUrl;
                a.download = `Screenshot_${index + 1}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(bUrl);
                
                btn.innerHTML = "✅ Saved!";
                btn.style.color = "#0f0";
                btn.style.borderColor = "#0f0";
            } catch (err) {
                // If it fails, open it so the user can still get it
                window.open(url, '_blank');
                btn.innerHTML = "⬇️ Save Image";
            }
        }

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
