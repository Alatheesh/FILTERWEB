<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --glass-bg: rgba(20, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent: #00d2ff;
            --btn-glow: rgba(0, 210, 255, 0.4);
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1.4rem;
            word-wrap: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .download-action-bar {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .premium-dl-btn {
            background: rgba(0, 210, 255, 0.15);
            color: #fff;
            border: 1px solid var(--accent);
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--btn-glow);
        }
        .premium-dl-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.03);
        }
        .premium-dl-btn:active {
            transform: scale(0.98);
        }

        .media-content img, .media-content video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            background: #000;
            border: 1px solid var(--glass-border);
        }
        
        .footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
        .footer-brand {
            margin-bottom: 8px;
            font-size: 1em;
            letter-spacing: 1px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .footer a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--accent);
        }
        .credits-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2 id="mediaTitle">Loading Media...</h2>
        
        <div class="download-action-bar">
            <button class="premium-dl-btn" id="masterDownloadBtn" onclick="handleMasterDownload()">
                <span>📥 One-Click Download</span>
            </button>
        </div>
        
        <div class="media-content" id="mediaContent">
        </div>

        <div class="footer">
            <div class="footer-brand">ミ💖 🇸 🇺 🇨 🇭 🇮 🇹 🇭 🇦 💖彡</div>
            <div class="credits-container">
                <span>Credits <a onclick="openTgLink('https://t.me/llathu63035')">NTM</a></span>
                <span>•</span>
                <span>Developer <a onclick="openTgLink('https://t.me/TG_LATHEESH')">LATHEESH</a></span>
            </div>
        </div>
    </div>

    <script>
        let globalUrlsArray = [];
        let isVideoMode = false;
        let activeRawVideoUrl = "";
        
        // 🚀 THE MAGIC CORS PROXY
        const CORS_PROXY = "https://corsproxy.io/?";

        function openTgLink(url) {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                window.Telegram.WebApp.openTelegramLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function decodeUrls(str) {
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            return decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        const params = new URLSearchParams(window.location.search);
        const movieTitleClean = params.get('title') || 'Movie_Media';
        document.getElementById('mediaTitle').textContent = decodeURIComponent(movieTitleClean);

        const imgData = params.get('data');
        const videoUrl = params.get('video');
        const contentBox = document.getElementById('mediaContent');
        const dlBtn = document.getElementById('masterDownloadBtn');

        if (videoUrl) {
            isVideoMode = true;
            activeRawVideoUrl = decodeURIComponent(videoUrl);
            dlBtn.innerHTML = "📥 Download Video Clip";
            
            contentBox.innerHTML = `
                <video controls autoplay playsinline preload="auto">
                    <source src="${activeRawVideoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
        } else if (imgData) {
            isVideoMode = false;
            dlBtn.innerHTML = "📥 Download All Images (.zip)";
            try {
                globalUrlsArray = decodeUrls(imgData).split(',');
                globalUrlsArray.forEach((url, index) => {
                    if(url.trim() !== '') {
                        const img = document.createElement('img');
                        img.src = url;
                        img.alt = `Screenshot ${index + 1}`;
                        img.loading = "lazy";
                        contentBox.appendChild(img);
                    }
                });
            } catch (e) {
                contentBox.innerHTML = "<p>Error rendering image cards.</p>";
            }
        } else {
            contentBox.innerHTML = "<p>No media data found.</p>";
            dlBtn.style.display = "none";
        }

        async function handleMasterDownload() {
            if (isVideoMode) {
                dlBtn.innerHTML = "⏳ Downloading File...";
                dlBtn.disabled = true;
                try {
                    // 🚀 APPLIED CORS PROXY TO VIDEO DOWNLOAD
                    const response = await fetch(CORS_PROXY + encodeURIComponent(activeRawVideoUrl));
                    if (!response.ok) throw new Error("Network response was not ok");
                    
                    const blob = await response.blob();
                    const bUrl = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = bUrl;
                    link.download = `${movieTitleClean.replace(/[^a-zA-Z0-9]/g, "_")}_sample.mp4`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(bUrl);
                } catch (err) {
                    window.open(activeRawVideoUrl, '_blank');
                }
                dlBtn.innerHTML = "🎬 Download Video Clip";
                dlBtn.disabled = false;
            } else {
                if (globalUrlsArray.length === 0) return;
                dlBtn.innerHTML = "⏳ Bundling Archive...";
                dlBtn.disabled = true;
                
                const zip = new JSZip();
                let successfullyFetched = 0;

                try {
                    for (let i = 0; i < globalUrlsArray.length; i++) {
                        const currentUrl = globalUrlsArray[i];
                        if (!currentUrl) continue;
                        
                        // 🚀 APPLIED CORS PROXY TO IMAGE BUNDLER
                        const response = await fetch(CORS_PROXY + encodeURIComponent(currentUrl));
                        if (!response.ok) throw new Error("Network response was not ok");
                        
                        const blob = await response.blob();
                        zip.file(`screenshot_${i + 1}.jpg`, blob);
                        successfullyFetched++;
                    }

                    if (successfullyFetched > 0) {
                        const zipBlob = await zip.generateAsync({type: "blob"});
                        const zipUrl = window.URL.createObjectURL(zipBlob);
                        const downloadLink = document.createElement('a');
                        downloadLink.href = zipUrl;
                        downloadLink.download = `${movieTitleClean.replace(/[^a-zA-Z0-9]/g, "_")}_Screenshots.zip`;
                        document.body.appendChild(downloadLink);
                        downloadLink.click();
                        document.body.removeChild(downloadLink);
                        window.URL.revokeObjectURL(zipUrl);
                    }
                } catch (error) {
                    globalUrlsArray.forEach((url, i) => {
                        if(!url) return;
                        const fallbackLink = document.createElement('a');
                        fallbackLink.href = url;
                        fallbackLink.download = `screenshot_${i + 1}.jpg`;
                        fallbackLink.target = "_blank";
                        document.body.appendChild(fallbackLink);
                        fallbackLink.click();
                        document.body.removeChild(fallbackLink);
                    });
                }
                dlBtn.innerHTML = "📥 Download All Images (.zip)";
                dlBtn.disabled = false;
            }
        }

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
