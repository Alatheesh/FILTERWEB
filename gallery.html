<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --glass-bg: rgba(20, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent: #00d2ff;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
        }
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }
        h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1.4rem;
            word-wrap: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        .floating-dl-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(10, 15, 20, 0.85);
            color: var(--accent);
            border: 1px solid var(--accent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .floating-dl-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.6);
        }
        .floating-dl-btn:active {
            transform: scale(0.95);
        }

        .media-content img, .media-content video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            background: #000;
            border: 1px solid var(--glass-border);
        }
        
        .footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
        .footer-brand {
            margin-bottom: 8px;
            font-size: 1em;
            letter-spacing: 1px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        .credits-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <!-- 🚀 FLOATING DOWNLOAD BUTTON -->
    <button class="floating-dl-btn" id="floatingDlBtn" onclick="handleMasterDownload()" style="display: none;">
        <span id="btnText">📥 Download</span>
    </button>

    <div class="glass-container">
        <h2 id="mediaTitle">Loading Media...</h2>
        <div class="media-content" id="mediaContent"></div>

        <div class="footer">
            <div class="footer-brand">ミ💖 🇸 🇺 🇨 🇭 🇮 🇹 🇭 🇦 💖彡</div>
            <div class="credits-container">
                <span>Credits <a onclick="openTgLink('https://t.me/llathu63035')">NTM</a></span>
                <span>•</span>
                <span>Developer <a onclick="openTgLink('https://t.me/TG_LATHEESH')">LATHEESH</a></span>
            </div>
        </div>
    </div>

    <script>
        let globalUrlsArray = [];
        let isVideoMode = false;
        let activeRawVideoUrl = "";

        function openTgLink(url) {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                window.Telegram.WebApp.openTelegramLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function decodeUrls(str) {
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            return decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        const params = new URLSearchParams(window.location.search);
        const movieTitleClean = params.get('title') || 'Movie_Media';
        const safeFilename = movieTitleClean.replace(/[^a-zA-Z0-9]/g, "_");
        document.getElementById('mediaTitle').textContent = decodeURIComponent(movieTitleClean);

        const imgData = params.get('data');
        const videoUrl = params.get('video');
        const contentBox = document.getElementById('mediaContent');
        const dlBtn = document.getElementById('floatingDlBtn');
        const btnText = document.getElementById('btnText');

        if (videoUrl) {
            isVideoMode = true;
            activeRawVideoUrl = decodeURIComponent(videoUrl);
            btnText.innerHTML = "📥 Download Video";
            dlBtn.style.display = "flex";
            
            contentBox.innerHTML = `
                <video controls autoplay playsinline preload="auto">
                    <source src="${activeRawVideoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
        } else if (imgData) {
            isVideoMode = false;
            btnText.innerHTML = "📥 Download Images";
            dlBtn.style.display = "flex";

            try {
                globalUrlsArray = decodeUrls(imgData).split(',');
                globalUrlsArray.forEach((url, index) => {
                    if(url.trim() !== '') {
                        const img = document.createElement('img');
                        img.src = url;
                        img.alt = `Screenshot ${index + 1}`;
                        img.loading = "lazy";
                        contentBox.appendChild(img);
                    }
                });
            } catch (e) {
                contentBox.innerHTML = "<p>Error rendering images.</p>";
            }
        }

        // 🚀 YOUR DOWNLOAD LOGIC APPLIED HERE
        function handleMasterDownload() {
            dlBtn.disabled = true;

            if (isVideoMode) {
                btnText.innerHTML = "⏳ Downloading...";
                
                const a = document.createElement("a");
                a.href = activeRawVideoUrl;
                a.download = `${safeFilename}_Sample.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                btnText.innerHTML = "✅ Video Downloaded!";
                
                setTimeout(() => {
                    btnText.innerHTML = "📥 Download Video";
                    dlBtn.disabled = false;
                }, 3000);
                
            } else {
                if (globalUrlsArray.length === 0) return;
                btnText.innerHTML = "⏳ Downloading...";
                
                globalUrlsArray.forEach((url, index) => {
                    if(url.trim() === '') return;
                    
                    setTimeout(() => {
                        const a = document.createElement("a");
                        a.href = url.trim();
                        a.download = `${safeFilename}_${index + 1}.jpg`;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                    }, index * 500);
                });
                
                // Reset button text after the last timeout finishes
                const totalTime = (globalUrlsArray.length * 500) + 1000;
                setTimeout(() => {
                    btnText.innerHTML = "✅ All Downloaded!";
                    setTimeout(() => {
                        btnText.innerHTML = "📥 Download Images";
                        dlBtn.disabled = false;
                    }, 3000);
                }, totalTime);
            }
        }

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
