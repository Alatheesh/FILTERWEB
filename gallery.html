<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    <style>
        :root {
            --glass-bg: rgba(20, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent: #00d2ff;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1.4rem;
            word-wrap: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .media-content img, .media-content video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            background: #000;
            border: 1px solid var(--glass-border);
        }
        
        /* 🚀 NEW HIGHLIGHTED FOOTER STYLES */
        .footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
        .footer-brand {
            margin-bottom: 8px;
            font-size: 1em;
            letter-spacing: 1px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .footer a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--accent);
        }
        .credits-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Hide scrollbar for seamless Telegram Web App look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2 id="mediaTitle">Loading Media...</h2>
        
        <div class="media-content" id="mediaContent">
            <!-- Images or Video dynamically injected here -->
        </div>

        <!-- 🚀 NEW HIGHLIGHTED FOOTER -->
        <div class="footer">
            <div class="footer-brand">ミ💖 🇸 🇺 🇨 🇭 🇮 🇹 🇭 🇦 💖彡</div>
            <div class="credits-container">
                <span>Credits <a href="https://t.me/llathu63035" target="_blank">NTM</a></span>
                <span>•</span>
                <span>Developer <a href="https://t.me/TG_LATHEESH" target="_blank">LATHEESH</a></span>
            </div>
        </div>
    </div>

    <script>
        // Secure URL Decoder for Base64 Strings
        function decodeUrls(str) {
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            return decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        // Parse the URL parameters sent by the bot
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Media Viewer';
        document.getElementById('mediaTitle').textContent = title;

        const imgData = params.get('data');
        const videoUrl = params.get('video');
        const contentBox = document.getElementById('mediaContent');

        if (videoUrl) {
            // 🎬 STREAM VIDEO PLAYER MODE
            contentBox.innerHTML = `
                <video controls autoplay playsinline preload="auto">
                    <source src="${videoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
        } else if (imgData) {
            // 🖼️ IMAGE GALLERY MODE
            try {
                const urls = decodeUrls(imgData).split(',');
                urls.forEach((url, index) => {
                    if(url.trim() !== '') {
                        const img = document.createElement('img');
                        img.src = url;
                        img.alt = `Screenshot ${index + 1}`;
                        img.loading = "lazy";
                        contentBox.appendChild(img);
                    }
                });
            } catch (e) {
                contentBox.innerHTML = "<p>Error rendering images.</p>";
            }
        } else {
            contentBox.innerHTML = "<p>No media found. The link may have expired.</p>";
        }
    </script>
</body>
</html>
