<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-main: #0B0E14;
            --bg-card: #151A22;
            --card-border: #232A35;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.2);
            --warning-bg: rgba(245, 158, 11, 0.1);
            --warning-text: #F59E0B;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at top right, rgba(0, 210, 255, 0.05), transparent 400px),
                radial-gradient(circle at bottom left, rgba(0, 210, 255, 0.05), transparent 400px);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
            animation: fadeIn 0.6s ease-out;
        }

        .glass-container {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 25px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            font-weight: 800;
            word-wrap: break-word;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #fff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .floating-dl-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(15, 20, 25, 0.85);
            color: var(--accent);
            border: 1px solid rgba(0, 210, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .floating-dl-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 25px rgba(0, 210, 255, 0.5);
            transform: translateY(-2px);
        }
        .floating-dl-btn:active {
            transform: scale(0.95);
        }

        .media-content img, .media-content video {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            background: #000;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
        }
        
        /* 🔊 Audio Layout Updates */
        .audio-info-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .audio-info-box h4 {
            margin: 0 0 15px 0;
            color: #fff;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .audio-layout {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 5px;
        }
        .audio-category {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .audio-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            width: 60px; /* Aligns the chips properly */
            margin-top: 6px;
        }
        .audio-chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        .audio-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            cursor: default; /* Tells user it's not a button */
        }
        .audio-chip.default {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .warning-banner {
            background: var(--warning-bg);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.85rem;
            color: var(--warning-text);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 18px;
            line-height: 1.5;
        }

        details.metadata-accordion {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            text-align: left;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        details.metadata-accordion summary {
            padding: 18px 20px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            outline: none;
            user-select: none;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        details.metadata-accordion summary::-webkit-details-marker {
            display: none;
        }
        details.metadata-accordion summary::after {
            content: "+";
            font-size: 1.2rem;
            color: var(--accent);
            transition: transform 0.3s ease;
        }
        details[open].metadata-accordion summary::after {
            content: "−";
            transform: rotate(180deg);
        }
        .metadata-content {
            padding: 0 20px 20px 20px;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            color: var(--accent);
            line-height: 1.7;
        }
        
        .footer {
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .footer-brand {
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #fff;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .footer a:hover {
            color: #fff;
        }
        .credits-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <button class="floating-dl-btn" id="floatingDlBtn" onclick="handleMasterDownload()" style="display: none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        <span id="btnText">Download</span>
    </button>

    <div class="glass-container">
        <h2 id="mediaTitle">Loading Media...</h2>
        <div class="media-content" id="mediaContent"></div>

        <div class="footer">
            <div class="footer-brand">ミ💖 🇸 🇺 🇨 🇭 🇮 🇹 🇭 🇦 💖彡</div>
            <div class="credits-container">
                <span>Credits <a onclick="openTgLink('https://t.me/llathu63035')">NTM</a></span>
                <span>•</span>
                <span>Developer <a onclick="openTgLink('https://t.me/TG_LATHEESH')">LATHEESH</a></span>
            </div>
        </div>
    </div>

    <script>
        function openTgLink(url) {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                window.Telegram.WebApp.openTelegramLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function decodeData(str) {
            if(!str) return "";
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            try {
                return decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch(e) { return ""; }
        }

        const params = new URLSearchParams(window.location.search);
        const movieTitleClean = params.get('title') || 'Movie_Media';
        document.getElementById('mediaTitle').textContent = decodeURIComponent(movieTitleClean);

        const imgData = params.get('data');
        const videoUrl = params.get('video');
        
        const audioDataEncoded = params.get('audio');
        const metaDataEncoded = params.get('meta');
        
        let audioArr = audioDataEncoded ? decodeData(audioDataEncoded).split('\n') : [];
        let metaText = metaDataEncoded ? decodeData(metaDataEncoded) : "Basic Metadata Information:\n• File Name: " + decodeURIComponent(movieTitleClean);

        const contentBox = document.getElementById('mediaContent');

        function createMetadataAccordion() {
            return `
            <details class="metadata-accordion">
                <summary>
                    <span style="display:flex; align-items:center; gap:8px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                        View File Metadata
                    </span>
                </summary>
                <div class="metadata-content">${metaText}</div>
            </details>`;
        }

        if (videoUrl) {
            const activeRawVideoUrl = decodeURIComponent(videoUrl);
            
            let audioHTML = "";
            if (audioArr.length > 0) {
                // Render Default Audio
                let defaultAudio = `
                    <div class="audio-category">
                        <span class="audio-label">Default:</span>
                        <div class="audio-chip default">▶ ${audioArr[0]}</div>
                    </div>`;
                
                let otherAudios = "";
                let warningBanner = "";

                // Render 'Others' and 'Warning' ONLY if there is more than 1 track
                if (audioArr.length > 1) {
                    let otherChips = audioArr.slice(1).map(track => `<div class="audio-chip">${track}</div>`).join('');
                    otherAudios = `
                        <div class="audio-category">
                            <span class="audio-label">Others:</span>
                            <div class="audio-chip-container">
                                ${otherChips}
                            </div>
                        </div>`;
                        
                    warningBanner = `
                        <div class="warning-banner">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:2px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            <div><b>Audio playback cannot be changed in this preview.</b><br>To switch languages, download the video using the 3 dots (⋮) in the player above, open them in external players like MX Player or Playit and change the audios.</div>
                        </div>`;
                }
                
                audioHTML = `
                <div class="audio-info-box">
                    <h4>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        Audio Tracks Found
                    </h4>
                    <div class="audio-layout">
                        ${defaultAudio}
                        ${otherAudios}
                    </div>
                    ${warningBanner}
                </div>`;
            }

            contentBox.innerHTML = `
                <video controls autoplay playsinline preload="auto" poster="">
                    <source src="${activeRawVideoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                ${audioHTML}
                ${createMetadataAccordion()}
            `;
            
        } else if (imgData) {
            let htmlBuffer = "";
            const urls = decodeData(imgData).split(',');
            urls.forEach((url, index) => {
                if(url.trim() !== '') {
                    htmlBuffer += `<img src="${url}" alt="Screenshot ${index + 1}" loading="lazy">`;
                }
            });
            
            htmlBuffer += createMetadataAccordion();
            contentBox.innerHTML = htmlBuffer;
        } else {
            contentBox.innerHTML = "<p>No media data found.</p>";
        }

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
