<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Viewer</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --glass-bg: rgba(20, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent: #00d2ff;
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: var(--accent);
            font-size: 1.4rem;
            word-wrap: break-word;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .media-content img, .media-content video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            background: #000;
            border: 1px solid var(--glass-border);
        }
        
        /* 🚀 NEW: Audio Box Styles */
        .audio-info-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .audio-info-box h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }
        .audio-default {
            color: #00ff88;
            font-weight: bold;
        }
        .audio-others {
            color: #ccc;
            margin-top: 5px;
        }
        .warning-text {
            font-size: 0.85rem;
            color: #ffaa00;
            margin-top: 12px;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }

        /* 🚀 NEW: Collapsible Metadata Dropdown Styles */
        details.metadata-accordion {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            text-align: left;
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        details.metadata-accordion summary {
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            color: var(--accent);
            outline: none;
            user-select: none;
            list-style: none; /* Hides default arrow */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        details.metadata-accordion summary::-webkit-details-marker {
            display: none;
        }
        details.metadata-accordion summary::after {
            content: "▼";
            font-size: 0.8rem;
        }
        details[open].metadata-accordion summary::after {
            content: "▲";
        }
        .metadata-content {
            padding: 0 15px 15px 15px;
            font-size: 0.9rem;
            white-space: pre-wrap;
            color: #ddd;
            line-height: 1.6;
        }
        
        .footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
        .footer-brand {
            margin-bottom: 8px;
            font-size: 1em;
            letter-spacing: 1px;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }
        .credits-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2 id="mediaTitle">Loading Media...</h2>
        <div class="media-content" id="mediaContent"></div>

        <div class="footer">
            <div class="footer-brand">ミ💖 🇸 🇺 🇨 🇭 🇮 🇹 🇭 🇦 💖彡</div>
            <div class="credits-container">
                <span>Credits <a onclick="openTgLink('https://t.me/llathu63035')">NTM</a></span>
                <span>•</span>
                <span>Developer <a onclick="openTgLink('https://t.me/TG_LATHEESH')">LATHEESH</a></span>
            </div>
        </div>
    </div>

    <script>
        function openTgLink(url) {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
                window.Telegram.WebApp.openTelegramLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        function decodeData(str) {
            if(!str) return "";
            let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) { base64 += '='; }
            try {
                return decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch(e) { return ""; }
        }

        const params = new URLSearchParams(window.location.search);
        const movieTitleClean = params.get('title') || 'Movie_Media';
        document.getElementById('mediaTitle').textContent = decodeURIComponent(movieTitleClean);

        const imgData = params.get('data');
        const videoUrl = params.get('video');
        
        // 🚀 Fetching Bot's New Metadata payload
        const audioDataEncoded = params.get('audio');
        const metaDataEncoded = params.get('meta');
        
        let audioArr = audioDataEncoded ? decodeData(audioDataEncoded).split('\n') : [];
        let metaText = metaDataEncoded ? decodeData(metaDataEncoded) : "Basic Metadata Information:\n• File Name: " + decodeURIComponent(movieTitleClean);

        const contentBox = document.getElementById('mediaContent');

        // Reusable function to create the Metadata Button
        function createMetadataAccordion() {
            return `
            <details class="metadata-accordion">
                <summary>📊 View File Metadata</summary>
                <div class="metadata-content">${metaText}</div>
            </details>`;
        }

        if (videoUrl) {
            const activeRawVideoUrl = decodeURIComponent(videoUrl);
            
            // Generate Audio UI
            let audioHTML = "";
            if (audioArr.length > 0) {
                let defaultAudio = audioArr[0];
                let otherAudios = audioArr.slice(1).join(', ');
                
                audioHTML = `
                <div class="audio-info-box">
                    <h4>🔊 Audio Tracks Found</h4>
                    <div class="audio-default">▶ Default: ${defaultAudio}</div>
                    ${otherAudios ? `<div class="audio-others">▶ Other Tracks: ${otherAudios}</div>` : ''}
                    <div class="warning-text">
                        ⚠️ Note: Audio changeable will not work here. To change audio, download the video by clicking the 3 dots (⋮) inside the player and clicking Download, after video downloaded please use any player like mx player or playit and change audio.
                    </div>
                </div>`;
            }

            // Using Native HTML5 Player (Includes Built-in Download)
            contentBox.innerHTML = `
                <video controls autoplay playsinline preload="auto">
                    <source src="${activeRawVideoUrl}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                ${audioHTML}
                ${createMetadataAccordion()}
            `;
            
        } else if (imgData) {
            let htmlBuffer = "";
            const urls = decodeData(imgData).split(',');
            urls.forEach((url, index) => {
                if(url.trim() !== '') {
                    htmlBuffer += `<img src="${url}" alt="Screenshot ${index + 1}" loading="lazy">`;
                }
            });
            
            // Append images and the metadata button at the bottom
            htmlBuffer += createMetadataAccordion();
            contentBox.innerHTML = htmlBuffer;
        } else {
            contentBox.innerHTML = "<p>No media data found.</p>";
        }

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
