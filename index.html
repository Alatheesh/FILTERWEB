<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Movies</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #17212b);
            color: var(--tg-theme-text-color, #f5f5f5);
            margin: 0;
            padding: 15px;
            padding-bottom: 80px;
        }
        h2 { margin-top: 0; font-size: 1.3rem; color: var(--tg-theme-hint-color, #8ba1b6); }
        .movie-item {
            background-color: var(--tg-theme-secondary-bg-color, #242f3d);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: 0.2s ease;
        }
        .movie-item:active { transform: scale(0.98); }
        .checkbox-container {
            display: flex;
            align-items: center;
            width: 100%;
            cursor: pointer;
        }
        input[type="checkbox"] {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--tg-theme-button-color, #2b9eb3);
            border-radius: 5px;
            margin-right: 15px;
            position: relative;
            outline: none;
            flex-shrink: 0;
        }
        input[type="checkbox"]:checked {
            background-color: var(--tg-theme-button-color, #2b9eb3);
        }
        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px;
            font-weight: bold;
            left: 5px;
            top: 0px;
        }
        .movie-title { font-size: 1rem; font-weight: 500; word-break: break-word; }
        .send-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background-color: var(--tg-theme-button-color, #2b9eb3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Select files to download:</h2>
    <div id="movie-list"></div>
    <button class="send-btn" id="sendBtn" onclick="sendSelected()">Send Selected Files</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const urlParams = new URLSearchParams(window.location.search);
        const botUsername = urlParams.get('bot') || "suchitha1bot"; 
        const shortId = urlParams.get('id'); // The short RAM Cache ID
        const rawData = urlParams.get('data');
        
        let movies = [];
        try {
            movies = JSON.parse(decodeURIComponent(rawData));
        } catch(e) {
            document.getElementById('movie-list').innerHTML = "<p>Error loading movies.</p>";
        }

        const listContainer = document.getElementById('movie-list');
        
        // Render 60 movies with index IDs mapping to the backend Cache
        movies.forEach((title, index) => {
            const div = document.createElement('div');
            div.className = 'movie-item';
            div.innerHTML = `
                <label class="checkbox-container">
                    <input type="checkbox" value="${index}">
                    <span class="movie-title">📂 ${title}...</span>
                </label>
            `;
            listContainer.appendChild(div);
        });

        function sendSelected() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            
            if (checkboxes.length === 0) {
                tg.showAlert("Please select at least one movie!");
                return;
            }

            // ADVANCED: Convert selections into a Hexadecimal Bitmask to bypass the 64-character limit
            let mask = 0n;
            checkboxes.forEach(cb => {
                let idx = BigInt(cb.value);
                mask |= (1n << idx);
            });
            let hexMask = mask.toString(16);

            // Construct the extremely short deep link (e.g., ?start=blk_a1b2c3d4_f)
            const deepLink = `https://t.me/${botUsername}?start=blk_${shortId}_${hexMask}`;
            
            // Send to bot AND close the UI immediately so the user can see the files arriving!
            tg.openTelegramLink(deepLink);
            setTimeout(() => {
                tg.close();
            }, 100); 
        }
    </script>
</body>
</html>
