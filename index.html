<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delivery Manager</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- External Libraries -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <!-- 🚀 INSTANT THEME SWITCHER -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userTier = urlParams.get('tier') || 'free'; 
        document.documentElement.setAttribute('data-theme', userTier);
    </script>
</head>
<body>

    <!-- Ambient Glowing Backgrounds (Hidden globally, shown by CSS for VIPs) -->
    <div id="premium-blobs">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
    </div>

    <!-- TAB: CLOUD FILES -->
    <div id="tab-files" class="tab-content active">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search your files...">
        <div id="loadingWrapper">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">Syncing Secure Cloud...</div>
        </div>
        <div id="movie-list"></div>
        <div class="pagination" id="paginationBar" style="display: none;">
            <button class="page-btn" id="prevBtn">◀ Prev</button>
            <span class="page-info" id="pageInfo">Page 1</span>
            <button class="page-btn" id="nextBtn">Next ▶</button>
        </div>
        <button class="fab-btn" id="continueBtn" style="display:none;">Continue (0)</button>
    </div>

    <!-- TAB: QUEUE MANAGER -->
    <div id="tab-manager" class="tab-content">
        <div class="card info-card">
            <div class="info-header">⭐ Collection Manager</div>
            <div class="info-row"><span class="info-label">📦 Selected:</span><span class="info-value" id="mgr-count">0 Files</span></div>
            <div class="info-row"><span class="info-label">💾 Total Size:</span><span class="info-value" id="mgr-size">0 MB</span></div>
            <div class="info-row">
                <span class="info-label">🔀 Sort:</span>
                <select class="sort-dropdown" id="sortDrop">
                    <option value="manual">▼ Manual Sorting</option>
                    <option value="size">Size (Large to Small)</option>
                </select>
            </div>
            <div class="action-row">
                <button class="action-btn" id="btn-reverse">⇅ Reverse</button>
                <button class="action-btn" id="btn-reset">🔄 Reset</button>
            </div>
        </div>
        <div id="manager-list"></div>
    </div>

    <!-- TAB: PREVIEW & SEND -->
    <div id="tab-preview" class="tab-content">
        <div class="card info-card" style="margin-bottom:15px;">
            <div class="info-header">👀 Delivery Preview</div>
            <div style="font-size:0.9rem; text-align:center; font-weight:500;" class="info-label">Files will be delivered to your PM in this exact sequence.</div>
        </div>
        <div class="card" style="flex-direction:column; align-items:flex-start;" id="preview-list"></div>
        <button class="fab-btn" id="sendBtn">📤 Send Securely</button>
    </div>

    <!-- MULTI-SELECT ACTION TOOLBAR -->
    <div class="multi-toolbar" id="multiToolbar">
        <button class="tb-btn tb-move" id="btn-move-top">⬆ Move Top</button>
        <button class="tb-btn tb-move" id="btn-move-bottom">⬇ Move Bottom</button>
        <button class="tb-btn tb-del" id="btn-remove-multi">🗑 Remove</button>
        <button class="tb-btn tb-cancel" id="btn-cancel-multi">❌ Cancel Selection</button>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <div class="nav-item active" id="nav-files" data-target="files">📂 Cloud</div>
        <div class="nav-item" id="nav-manager" data-target="manager">⭐ Queue</div>
        <div class="nav-item" id="nav-preview" data-target="preview">👀 Review</div>
    </div>

    <!-- External JavaScript -->
    <script src="app.js"></script>
</body>
</html>
